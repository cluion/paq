version: 2

builds:
  - main: ./cmd/paq/
    binary: paq
    ldflags:
      - -X github.com/cluion/paq/internal/cli.version={{.Version}}
      - -X github.com/cluion/paq/internal/cli.commit={{.ShortCommit}}
      - -X github.com/cluion/paq/internal/cli.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: cluion
      name: homebrew-tap
    homepage: https://github.com/cluion/paq
    description: Unified CLI for querying installed packages across package managers
